name: watchlog
description: Mobile companion app for watchlog – tap-to-fix server alerts on your phone.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Secure storage for API token
  flutter_secure_storage: ^9.2.2

  # Pull-to-refresh
  flutter_hooks: ^0.20.5

  # Date formatting (pinned to match flutter_localizations transitive
  # dependency from the SDK)
  intl: ^0.20.2

  # Firebase / push notifications + crash reporting
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_crashlytics: ^4.2.0
  flutter_local_notifications: ^18.0.1

  # QR code scanner for pairing flow
  mobile_scanner: ^5.2.3

  # Biometric authentication (Face ID / fingerprint / device PIN)
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  local_auth_darwin: ^1.4.0

  # Encrypted settings export / import
  cryptography: ^2.7.0
  share_plus: ^10.1.4
  file_picker: ^8.1.6
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
  adaptive_icon_background: "#0B1020"
  adaptive_icon_foreground: "assets/icon/icon.png"

# Native splash configuration — run on Windows after pulling:
#   dart run flutter_native_splash:create
# That generates the platform-specific drawables / launchScreens so
# the white-screen-before-Flutter-loads goes away. Branded with the
# same slate-navy background as the app's dark theme.
flutter_native_splash:
  color: "#0F172A"
  color_dark: "#0F172A"
  image: "assets/icon/icon.png"
  android_12:
    color: "#0F172A"
    color_dark: "#0F172A"
    image: "assets/icon/icon.png"
  android: true
  ios: true
  web: false
